# My Ez CLI — default Docker image tags for all tools
# Format: MEC_IMAGE_<TOOL>=<image>:<tag>
#
# Group A — Public images (tool version = image tag):
#   Override via: mec update <tool> <tag>
#   e.g.  MEC_IMAGE_TERRAFORM=hashicorp/terraform:1.12.0
#
# Group B — Custom my-ez-cli builds (tag is always "latest"):
#   Version management tracked in: https://github.com/DavidCardoso/my-ez-cli/issues/130
#   Use "mec update <tool>" only to pull the latest published build.

# Base repo/tag for custom my-ez-cli images
MEC_IMAGE_REPO="${MEC_IMAGE_REPO:-davidcardoso/my-ez-cli}"
MEC_IMAGE_TAG="${MEC_IMAGE_TAG:-latest}"

# --- Group A: Public images ---
MEC_IMAGE_AWS="${MEC_IMAGE_AWS:-amazon/aws-cli:latest}"
MEC_IMAGE_TERRAFORM="${MEC_IMAGE_TERRAFORM:-hashicorp/terraform:1.14.5}"
MEC_IMAGE_GCLOUD="${MEC_IMAGE_GCLOUD:-eu.gcr.io/google.com/cloudsdktool/google-cloud-cli:latest}"
MEC_IMAGE_PYTHON="${MEC_IMAGE_PYTHON:-python:3.12}"
MEC_IMAGE_PROMPTFOO="${MEC_IMAGE_PROMPTFOO:-ghcr.io/promptfoo/promptfoo:latest}"
MEC_IMAGE_NODE="${MEC_IMAGE_NODE:-node:22-alpine}"
MEC_IMAGE_NODE20="${MEC_IMAGE_NODE20:-node:20-alpine}"
MEC_IMAGE_NODE22="${MEC_IMAGE_NODE22:-node:22-alpine}"
MEC_IMAGE_NODE24="${MEC_IMAGE_NODE24:-node:24-alpine}"

# --- Group B: Custom my-ez-cli builds ---
MEC_IMAGE_AI_SERVICE="${MEC_IMAGE_AI_SERVICE:-${MEC_IMAGE_REPO}:ai-service-${MEC_IMAGE_TAG}}"
MEC_IMAGE_CONFIG_SERVICE="${MEC_IMAGE_CONFIG_SERVICE:-${MEC_IMAGE_REPO}:config-service-${MEC_IMAGE_TAG}}"
MEC_IMAGE_CLAUDE="${MEC_IMAGE_CLAUDE:-${MEC_IMAGE_REPO}:claude-${MEC_IMAGE_TAG}}"
MEC_IMAGE_SERVERLESS="${MEC_IMAGE_SERVERLESS:-${MEC_IMAGE_REPO}:serverless-${MEC_IMAGE_TAG}}"
MEC_IMAGE_SPEEDTEST="${MEC_IMAGE_SPEEDTEST:-${MEC_IMAGE_REPO}:speedtest-${MEC_IMAGE_TAG}}"
MEC_IMAGE_AWS_SSO_CRED="${MEC_IMAGE_AWS_SSO_CRED:-${MEC_IMAGE_REPO}:aws-sso-cred-${MEC_IMAGE_TAG}}"
MEC_IMAGE_YARN_BERRY="${MEC_IMAGE_YARN_BERRY:-${MEC_IMAGE_REPO}:yarn-berry-${MEC_IMAGE_TAG}}"
MEC_IMAGE_YARN_PLUS="${MEC_IMAGE_YARN_PLUS:-${MEC_IMAGE_REPO}:yarn-plus-${MEC_IMAGE_TAG}}"
MEC_IMAGE_DASHBOARD="${MEC_IMAGE_DASHBOARD:-${MEC_IMAGE_REPO}:dashboard-${MEC_IMAGE_TAG}}"
MEC_IMAGE_PLAYWRIGHT="${MEC_IMAGE_PLAYWRIGHT:-${MEC_IMAGE_REPO}:playwright-${MEC_IMAGE_TAG}}"
