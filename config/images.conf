# My Ez CLI — default Docker image tags for all tools
#
# Group A — Public images (MEC_<TOOL>_VERSION = image tag):
#   Override via: mec update <tool> <version>
#   e.g.  MEC_TERRAFORM_VERSION=1.15.0
#
# Group B — Custom my-ez-cli builds:
#   MEC_<TOOL>_VERSION is the binary version inside the image.
#   Override via: mec update <tool>[:<version>] | mec reset <tool>
#
# Group C — Internal services:
#   MEC_<SERVICE>_VERSION accepts sha-<hash> tags for GitOps pinning.
#   Override via: mec update <service>[:<sha>] | mec reset <service>

# Base repo/tag for custom my-ez-cli images
MEC_IMAGE_REPO="${MEC_IMAGE_REPO:-ghcr.io/my-ez-cli}"
MEC_IMAGE_TAG="${MEC_IMAGE_TAG:-latest}"

# --- Group A: Public images ---
# Version var declared first; image var derived from it.
MEC_TERRAFORM_VERSION="${MEC_TERRAFORM_VERSION:-1.14.5}"
MEC_IMAGE_TERRAFORM="${MEC_IMAGE_TERRAFORM:-hashicorp/terraform:${MEC_TERRAFORM_VERSION}}"

MEC_AWS_VERSION="${MEC_AWS_VERSION:-latest}"
MEC_IMAGE_AWS="${MEC_IMAGE_AWS:-amazon/aws-cli:${MEC_AWS_VERSION}}"

MEC_GCLOUD_VERSION="${MEC_GCLOUD_VERSION:-latest}"
MEC_IMAGE_GCLOUD="${MEC_IMAGE_GCLOUD:-eu.gcr.io/google.com/cloudsdktool/google-cloud-cli:${MEC_GCLOUD_VERSION}}"

MEC_PYTHON_VERSION="${MEC_PYTHON_VERSION:-3.12}"
MEC_IMAGE_PYTHON="${MEC_IMAGE_PYTHON:-python:${MEC_PYTHON_VERSION}}"

MEC_NODE_VERSION="${MEC_NODE_VERSION:-22-alpine}"
MEC_IMAGE_NODE="${MEC_IMAGE_NODE:-node:${MEC_NODE_VERSION}}"

MEC_PROMPTFOO_VERSION="${MEC_PROMPTFOO_VERSION:-latest}"
MEC_IMAGE_PROMPTFOO="${MEC_IMAGE_PROMPTFOO:-ghcr.io/promptfoo/promptfoo:${MEC_PROMPTFOO_VERSION}}"

# node20/22/24 use hardcoded images — fixed versions by design, not user-manageable

# --- Group B: Custom my-ez-cli image versions ---
# Declare versions first; image vars below derive from them.
MEC_YARN_BERRY_VERSION="${MEC_YARN_BERRY_VERSION:-4.14.1}"
MEC_CLAUDE_VERSION="${MEC_CLAUDE_VERSION:-latest}"
MEC_PLAYWRIGHT_VERSION="${MEC_PLAYWRIGHT_VERSION:-latest}"
MEC_SERVERLESS_VERSION="${MEC_SERVERLESS_VERSION:-latest}"
MEC_SPEEDTEST_VERSION="${MEC_SPEEDTEST_VERSION:-latest}"
MEC_AWS_SSO_CRED_VERSION="${MEC_AWS_SSO_CRED_VERSION:-latest}"
MEC_YARN_PLUS_VERSION="${MEC_YARN_PLUS_VERSION:-1.22.22}"
MEC_YARN_PLUS_BASE_VERSION="${MEC_YARN_PLUS_BASE_VERSION:-22}"

# --- Group B: Custom my-ez-cli image refs ---
MEC_IMAGE_YARN_BERRY="${MEC_IMAGE_YARN_BERRY:-${MEC_IMAGE_REPO}/yarn-berry:${MEC_YARN_BERRY_VERSION}}"
MEC_IMAGE_CLAUDE="${MEC_IMAGE_CLAUDE:-${MEC_IMAGE_REPO}/claude:${MEC_CLAUDE_VERSION}}"
MEC_IMAGE_PLAYWRIGHT="${MEC_IMAGE_PLAYWRIGHT:-${MEC_IMAGE_REPO}/playwright:${MEC_PLAYWRIGHT_VERSION}}"
MEC_IMAGE_SERVERLESS="${MEC_IMAGE_SERVERLESS:-${MEC_IMAGE_REPO}/serverless:${MEC_SERVERLESS_VERSION}}"
MEC_IMAGE_SPEEDTEST="${MEC_IMAGE_SPEEDTEST:-${MEC_IMAGE_REPO}/speedtest:${MEC_SPEEDTEST_VERSION}}"
MEC_IMAGE_AWS_SSO_CRED="${MEC_IMAGE_AWS_SSO_CRED:-${MEC_IMAGE_REPO}/aws-sso-cred:${MEC_AWS_SSO_CRED_VERSION}}"
MEC_IMAGE_YARN_PLUS="${MEC_IMAGE_YARN_PLUS:-${MEC_IMAGE_REPO}/yarn-plus:${MEC_YARN_PLUS_VERSION}-node${MEC_YARN_PLUS_BASE_VERSION}}"

# --- Group C: Internal services (sha-pinnable via GitOps) ---
MEC_DASHBOARD_VERSION="${MEC_DASHBOARD_VERSION:-latest}"
MEC_IMAGE_DASHBOARD="${MEC_IMAGE_DASHBOARD:-${MEC_IMAGE_REPO}/dashboard:${MEC_DASHBOARD_VERSION}}"

MEC_AI_SERVICE_VERSION="${MEC_AI_SERVICE_VERSION:-latest}"
MEC_IMAGE_AI_SERVICE="${MEC_IMAGE_AI_SERVICE:-${MEC_IMAGE_REPO}/ai-service:${MEC_AI_SERVICE_VERSION}}"

MEC_CONFIG_SERVICE_VERSION="${MEC_CONFIG_SERVICE_VERSION:-latest}"
MEC_IMAGE_CONFIG_SERVICE="${MEC_IMAGE_CONFIG_SERVICE:-${MEC_IMAGE_REPO}/config-service:${MEC_CONFIG_SERVICE_VERSION}}"
