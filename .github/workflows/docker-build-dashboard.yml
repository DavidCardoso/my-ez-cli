name: Build Dashboard Docker Image

on:
  pull_request:
    paths:
      - 'docker/dashboard/**'
      - 'services/dashboard/**'
      - '.github/workflows/docker-build-dashboard.yml'
  workflow_call:
  workflow_dispatch:
  release:
    types: [published]

env:
  REGISTRY: docker.io
  IMAGE_NAME: davidcardoso/my-ez-cli
  TOOL_NAME: dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run backend unit tests inside image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --file ./docker/dashboard/Dockerfile \
            --tag dashboard-test \
            ./services/dashboard
          docker run --rm \
            --entrypoint python \
            dashboard-test \
            -m pytest tests/ -v

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.TOOL_NAME }}-latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=${{ env.TOOL_NAME }}-
            type=raw,value=${{ env.TOOL_NAME }}-sha-{{sha}}
            type=semver,pattern=${{ env.TOOL_NAME }}-{{version}}
            type=semver,pattern=${{ env.TOOL_NAME }}-{{major}}.{{minor}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./services/dashboard
          file: ./docker/dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results-dashboard.sarif'

      - name: Upload Trivy results to GitHub Security tab
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results-dashboard.sarif'
