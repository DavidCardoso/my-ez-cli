name: Build CDKTF Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/cdktf/python/**'
      - '.github/workflows/docker-build-cdktf.yml'
  pull_request:
    paths:
      - 'docker/cdktf/python/**'
      - '.github/workflows/docker-build-cdktf.yml'
  workflow_dispatch:
  workflow_call:
  release:
    types: [published]

env:
  REGISTRY: docker.io
  IMAGE_NAME: davidcardoso/my-ez-cli
  TOOL_NAME: cdktf
  # Note: ARM64 builds disabled due to QEMU emulation issues with native module compilation
  # CDKTF requires g++, make, and python which are extremely slow and crash under QEMU
  # To re-enable ARM64: change PLATFORMS to "linux/amd64,linux/arm64" and increase timeout
  PLATFORMS: linux/amd64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.TOOL_NAME }}-latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=${{ env.TOOL_NAME }}-
            type=raw,value=${{ env.TOOL_NAME }}-sha-{{sha}}
            type=semver,pattern=${{ env.TOOL_NAME }}-{{version}}
            type=semver,pattern=${{ env.TOOL_NAME }}-{{major}}.{{minor}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/cdktf/python
          platforms: ${{ env.PLATFORMS }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: docker-publish
    permissions:
      contents: read
      packages: write
      security-events: write
    # Note: Environment inherits repository secrets by default
    # Ensure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are set in repository secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.TOOL_NAME }}-latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=${{ env.TOOL_NAME }}-
            type=raw,value=${{ env.TOOL_NAME }}-sha-{{sha}}
            type=semver,pattern=${{ env.TOOL_NAME }}-{{version}}
            type=semver,pattern=${{ env.TOOL_NAME }}-{{major}}.{{minor}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./docker/cdktf/python
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results-cdktf.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results-cdktf.sarif'
