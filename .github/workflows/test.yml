name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

env:
  # Docker images to cache
  NODE_IMAGES: "node:22-alpine node:24-alpine"
  PYTHON_IMAGE: "python:3.12-alpine"
  TERRAFORM_IMAGE: "hashicorp/terraform:1.14.5"
  AWS_IMAGE: "amazon/aws-cli:latest"

jobs:
  # Pre-pull and cache Docker images for faster test execution
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker images
        id: cache-docker
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Pull and save Docker images
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images

          echo "Pulling Node.js images..."
          for img in $NODE_IMAGES; do
            docker pull $img &
          done

          echo "Pulling Python image..."
          docker pull $PYTHON_IMAGE &

          echo "Pulling Terraform image..."
          docker pull $TERRAFORM_IMAGE &

          echo "Pulling AWS CLI image..."
          docker pull $AWS_IMAGE &

          wait

          echo "Saving images to cache..."
          docker save $NODE_IMAGES $PYTHON_IMAGE $TERRAFORM_IMAGE $AWS_IMAGE -o /tmp/docker-images/images.tar

      - name: Load cached images
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/docker-images/images.tar

  # Fast smoke tests - syntax checks and basic validations
  smoke-tests:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load cached Docker images
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Restore cached images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          fi

      - name: Check Docker installation
        run: |
          docker --version
          docker info

      - name: Test bin scripts syntax
        run: |
          for script in bin/*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              echo "Testing $script..."
              bash -n "$script" || exit 1
            fi
          done

      - name: Test common utilities
        run: |
          source bin/utils/common.sh
          check_docker || { echo "Docker check failed"; exit 1; }
          echo "✓ Common utilities test passed"

      - name: Test setup.sh syntax
        run: |
          bash -n setup.sh
          echo "✓ setup.sh syntax check passed"

      - name: Test setup.sh help command
        run: |
          ./setup.sh help
          echo "✓ setup.sh help command passed"

      - name: Test setup.sh status command
        run: |
          ./setup.sh status
          echo "✓ setup.sh status command passed"

      - name: Test mec CLI help
        run: |
          ./bin/mec help
          echo "✓ mec help passed"

      - name: Test mec version
        run: |
          ./bin/mec version
          echo "✓ mec version passed"

      - name: Test mec doctor help
        run: |
          ./bin/mec doctor help
          echo "✓ mec doctor help passed"

      - name: Test mec config help
        run: |
          ./bin/mec config --help
          echo "✓ mec config help passed"

      - name: Test mec logs help
        run: |
          ./bin/mec logs --help
          echo "✓ mec logs help passed"

      - name: Test mec ai help
        run: |
          ./bin/mec ai --help
          echo "✓ mec ai help passed"

      - name: Test mec dashboard help
        run: |
          ./bin/mec dashboard help
          echo "✓ mec dashboard help passed"

      - name: Test mec purge help
        run: |
          ./bin/mec purge help
          echo "✓ mec purge help passed"

      - name: Test mec dashboard rebuild help
        run: |
          ./bin/mec dashboard help | grep -q 'rebuild'
          echo "✓ mec dashboard rebuild documented in help"

      - name: Test mec tool subcommand dispatch
        run: |
          ./bin/mec help | grep -q 'TOOLS'
          echo "✓ mec help lists TOOLS section"
          ./bin/mec unknown-tool 2>&1 | grep -q 'Unknown command'
          echo "✓ mec unknown-tool returns error"

  # Unit tests - run in parallel for faster execution
  unit-tests:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - aws
          - common-utils
          - dashboard
          - doctor
          - node
          - npm
          - purge
          - python
          - setup
          - terraform
          - yarn
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load cached Docker images
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Restore cached images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          fi

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run unit tests - ${{ matrix.test-suite }}
        env:
          SKIP_DEPENDENCY_CHECK: 1
        run: |
          bats tests/unit/test-${{ matrix.test-suite }}.bats

  # Config service unit tests — pytest inside the Docker image
  unit-tests-config-service:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build config-service image for testing
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --file ./docker/config-service/Dockerfile \
            --tag config-service-test \
            ./services/config

      - name: Run pytest inside config-service image
        run: |
          docker run --rm \
            --entrypoint python \
            config-service-test \
            -m pytest tests/ -v

  # Dashboard API unit tests — pytest inside the Docker image
  unit-tests-dashboard-api:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard image for testing
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --file ./docker/dashboard/Dockerfile \
            --tag dashboard-test \
            ./services/dashboard

      - name: Run pytest inside dashboard image
        run: |
          docker run --rm \
            --entrypoint python \
            dashboard-test \
            -m pytest tests/ -v

  # Dashboard frontend unit tests — Vitest
  unit-tests-dashboard-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/dashboard/frontend/package.json

      - name: Install frontend dependencies
        run: cd services/dashboard/frontend && rm -f package-lock.json && npm install

      - name: Run Vitest unit tests
        run: cd services/dashboard/frontend && npm test

  # Dashboard E2E tests — Playwright against live FastAPI + built frontend
  e2e-tests-dashboard:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/dashboard/frontend/package.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install poetry==1.8.4
          poetry config virtualenvs.create false
          cd services/dashboard && poetry install --no-root --no-interaction

      - name: Install frontend dependencies and build
        run: |
          cd services/dashboard/frontend
          rm -f package-lock.json
          npm install
          npm run build
          # Copy built assets to where FastAPI's static mount expects them
          mkdir -p ../src/static
          cp -r dist/* ../src/static/

      - name: Install Playwright browsers
        run: cd services/dashboard/frontend && npx playwright install --with-deps chromium

      - name: Start FastAPI server with mock data
        run: |
          mkdir -p /tmp/mec-test-data/logs/node
          echo '{"session_id":"mec-node-test","tool":"node","execution":{"exit_code":0,"start_time":"2026-01-01T00:00:00Z"},"output":{"stdout":"v22.0.0","stderr":""}}' \
            > /tmp/mec-test-data/logs/node/2026-01-01_00-00-00.json
          MEC_DATA_ROOT=/tmp/mec-test-data uvicorn src.main:app --host 0.0.0.0 --port 4242 &
          sleep 3
        working-directory: services/dashboard

      - name: Run Playwright E2E tests
        run: cd services/dashboard/frontend && CI=true npx playwright test
        env:
          CI: true

  # Integration tests - run on main branch, releases, and workflow_dispatch
  integration-tests:
    runs-on: ubuntu-latest
    needs: [setup, smoke-tests]
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load cached Docker images
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Restore cached images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          fi

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run integration tests
        env:
          SKIP_DEPENDENCY_CHECK: 1
        run: |
          bats tests/integration/*.bats

  # Summary job - aggregate results
  summary:
    runs-on: ubuntu-latest
    needs: [smoke-tests, unit-tests, unit-tests-config-service, unit-tests-dashboard-api, unit-tests-dashboard-frontend, e2e-tests-dashboard, integration-tests]
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (config-service) | ${{ needs.unit-tests-config-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (dashboard-api) | ${{ needs.unit-tests-dashboard-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (dashboard-frontend) | ${{ needs.unit-tests-dashboard-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (dashboard) | ${{ needs.e2e-tests-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
