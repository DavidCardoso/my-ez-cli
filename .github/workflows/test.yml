name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

env:
  # Docker images to cache
  NODE_IMAGES: "node:22-alpine node:24-alpine"
  PYTHON_IMAGE: "python:3.12-alpine"
  TERRAFORM_IMAGE: "hashicorp/terraform:1.9.8"
  AWS_IMAGE: "amazon/aws-cli:latest"

jobs:
  # Pre-pull and cache Docker images for faster test execution
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker images
        id: cache-docker
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Pull and save Docker images
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images

          echo "Pulling Node.js images..."
          for img in $NODE_IMAGES; do
            docker pull $img &
          done

          echo "Pulling Python image..."
          docker pull $PYTHON_IMAGE &

          echo "Pulling Terraform image..."
          docker pull $TERRAFORM_IMAGE &

          echo "Pulling AWS CLI image..."
          docker pull $AWS_IMAGE &

          wait

          echo "Saving images to cache..."
          docker save $NODE_IMAGES $PYTHON_IMAGE $TERRAFORM_IMAGE $AWS_IMAGE -o /tmp/docker-images/images.tar

      - name: Load cached images
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/docker-images/images.tar

  # Fast smoke tests - syntax checks and basic validations
  smoke-tests:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load cached Docker images
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Restore cached images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          fi

      - name: Check Docker installation
        run: |
          docker --version
          docker info

      - name: Test bin scripts syntax
        run: |
          for script in bin/*; do
            if [ -f "$script" ] && [ -x "$script" ]; then
              echo "Testing $script..."
              bash -n "$script" || exit 1
            fi
          done

      - name: Test common utilities
        run: |
          source bin/utils/common.sh
          check_docker || { echo "Docker check failed"; exit 1; }
          echo "✓ Common utilities test passed"

      - name: Test setup.sh syntax
        run: |
          bash -n setup.sh
          echo "✓ setup.sh syntax check passed"

      - name: Test setup.sh help command
        run: |
          ./setup.sh help
          echo "✓ setup.sh help command passed"

      - name: Test setup.sh status command
        run: |
          ./setup.sh status
          echo "✓ setup.sh status command passed"

  # Unit tests - run in parallel for faster execution
  unit-tests:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - aws
          - common-utils
          - node
          - npm
          - python
          - setup
          - terraform
          - yarn
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load cached Docker images
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Restore cached images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          fi

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run unit tests - ${{ matrix.test-suite }}
        env:
          SKIP_DEPENDENCY_CHECK: 1
        run: |
          bats tests/unit/test-${{ matrix.test-suite }}.bats

  # Integration tests - run on main branch, releases, and workflow_dispatch
  integration-tests:
    runs-on: ubuntu-latest
    needs: [setup, smoke-tests]
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load cached Docker images
        uses: actions/cache@v3
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ hashFiles('.github/workflows/test.yml') }}-v1

      - name: Restore cached images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          fi

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run integration tests
        env:
          SKIP_DEPENDENCY_CHECK: 1
        run: |
          bats tests/integration/*.bats

  # Summary job - aggregate results
  summary:
    runs-on: ubuntu-latest
    needs: [smoke-tests, unit-tests, integration-tests]
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
