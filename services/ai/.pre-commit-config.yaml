# Pre-commit hooks for My Ez CLI AI Service
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

default_language_version:
  python: python3.12

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        name: ruff (lint)
        args: [--fix]
        types_or: [python, pyi]

      # Run the formatter
      - id: ruff-format
        name: ruff (format)
        types_or: [python, pyi]

  # Mypy - Static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (type check)
        additional_dependencies:
          - types-PyYAML>=6.0.0
          - anthropic>=0.76.0
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        # Only run on src directory to avoid test issues
        files: ^src/

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict

      # Check for merge conflict strings
      - id: check-merge-conflict

      # Check for debugger imports
      - id: debug-statements

      # Check JSON files are valid
      - id: check-json

      # Check YAML files are valid
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags

      # Check TOML files are valid
      - id: check-toml

      # Ensure files end with newline
      - id: end-of-file-fixer
        exclude: \.json$

      # Trim trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

      # Check for files that contain merge conflict strings
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python-specific checks
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      # Check for common Python anti-patterns
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: python-use-type-annotations

# Configure pre-commit to run faster
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
